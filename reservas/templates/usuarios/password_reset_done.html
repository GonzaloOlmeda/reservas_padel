{% extends 'base.html' %}

{% block title %}Correo enviado{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <h3 class="fw-bold mb-3">¡Listo!</h3>
                <p class="text-muted mb-4">Si existe una cuenta con ese correo, hemos enviado un enlace para restablecer tu contraseña.</p>
                <a href="{% url 'login' %}" class="btn btn-primary">Volver al login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
